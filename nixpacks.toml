[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs"]

[phases.install]
cmds = ["COMPOSER_ALLOW_SUPERUSER=1 composer install --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
  "COMPOSER_ALLOW_SUPERUSER=1 composer dump-autoload --optimize",
  "php bin/console cache:clear --env=prod"
]

[start]
cmd = "php bin/console doctrine:migrations:migrate --no-interaction && php -S 0.0.0.0:$PORT -t public"