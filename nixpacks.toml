[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs"]

[phases.install]
cmds = ["composer install --optimize-autoloader"]

[phases.build]
cmds = ["php bin/console cache:clear --env=prod"]

[start]
cmd = "php bin/console doctrine:migrations:migrate --no-interaction && php -S 0.0.0.0:8080 -t public"